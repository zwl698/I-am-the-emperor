<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我是皇帝</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="landing" id="landing">
        <div class="landing-art" aria-hidden="true"></div>
        <div class="landing-copy">
          <div class="seal">御</div>
          <h1>我是皇帝</h1>
          <p>选一个朝代，出生为皇子，夺嫡登基，然后在六部、边镇、宗室、商帮、清流与民生之间把王朝推向盛世或深渊。</p>
          <div class="landing-actions">
            <button id="start-selected" class="primary-button" type="button">以此朝开局</button>
            <button id="continue-game" class="ghost-button" type="button">继续本局</button>
            <button id="music-toggle" class="ghost-button music-button" type="button" aria-pressed="false">开启宫廷乐</button>
          </div>
        </div>
      </section>

      <section class="dynasty-section" aria-labelledby="dynasty-title">
        <div class="section-heading">
          <p>朝代选择</p>
          <h2 id="dynasty-title">每个时代都有不同的债</h2>
        </div>
        <div id="dynasty-grid" class="dynasty-grid"></div>
      </section>

      <section id="game-board" class="game-board is-empty">
        <aside class="left-rail">
          <div class="identity-panel">
            <div class="portrait-window">
              <div id="current-portrait" class="portrait-crop prince"></div>
            </div>
            <div>
              <p class="mini-label">当前身份</p>
              <h2 id="phase-label">未开局</h2>
              <p id="age-label">请先选择朝代。</p>
            </div>
          </div>
          <div id="stats-list" class="stats-list"></div>
        </aside>

        <section class="court-stage">
          <div id="scene-art" class="scene-art"></div>
          <div id="comic-strip" class="comic-strip" aria-label="动态漫画分镜"></div>
          <div class="scene-content">
            <div id="scene-kicker" class="scene-kicker">待诏</div>
            <h2 id="scene-title">皇城尚未启门</h2>
            <p id="scene-body">选择朝代后，史官会写下你的第一声啼哭。</p>
            <div id="choice-grid" class="choice-grid"></div>
            <div id="resolution" class="resolution" hidden></div>
          </div>
        </section>

        <aside class="right-rail">
          <section class="dynasty-card" id="current-dynasty"></section>
          <section class="crisis-card" id="crisis-card"></section>
          <section class="world-card">
            <div class="panel-title">天命目标</div>
            <div id="objective-list" class="objective-list"></div>
          </section>
          <section class="world-card">
            <div class="panel-title">四方省势</div>
            <div id="province-list" class="province-list"></div>
          </section>
          <section class="world-card">
            <div class="panel-title">朝堂派系</div>
            <div id="faction-list" class="faction-list"></div>
          </section>
          <section class="world-card">
            <div class="panel-title">起居注</div>
            <ol id="history-list" class="history-list"></ol>
          </section>
        </aside>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
