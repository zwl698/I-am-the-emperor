<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我是皇帝</title>
    <link rel="stylesheet" href="/styles.css?v=20260615-emperor" />
    <link rel="stylesheet" href="/systems.css" />
    <link rel="stylesheet" href="/gameplay.css?v=20260615-flow" />
    <link rel="stylesheet" href="/strategy-map.css?v=20260615-flow" />
    <link rel="stylesheet" href="/reform-tree.css" />
    <link rel="stylesheet" href="/talent-pool.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="landing" id="landing">
        <div class="landing-art" aria-hidden="true"></div>
        <div class="landing-copy">
          <div class="seal">御</div>
          <h1>我是皇帝</h1>
          <p>选一个朝代，出生为皇子，夺嫡登基，然后在六部、边镇、宗室、商帮、清流与民生之间把王朝推向盛世或深渊。</p>
          <div class="landing-actions">
            <button id="start-selected" class="primary-button" type="button">以此朝开局</button>
            <button id="continue-game" class="ghost-button" type="button">继续本局</button>
            <button id="music-toggle" class="ghost-button music-button" type="button" aria-pressed="false">开启宫廷乐</button>
            <button id="voice-toggle" class="ghost-button voice-button" type="button" aria-pressed="false">开启配音</button>
          </div>
        </div>
      </section>

      <section class="dynasty-section" aria-labelledby="dynasty-title">
        <div class="section-heading">
          <p>朝代选择</p>
          <h2 id="dynasty-title">每个时代都有不同的债</h2>
        </div>
        <div id="dynasty-grid" class="dynasty-grid"></div>
      </section>

      <section id="game-board" class="game-board is-empty">
        <aside class="left-rail">
          <div class="identity-panel">
            <div class="portrait-window">
              <div id="current-portrait" class="portrait-crop prince"></div>
            </div>
            <div>
              <p class="mini-label">当前身份</p>
              <h2 id="phase-label">未开局</h2>
              <p id="age-label">请先选择朝代。</p>
            </div>
          </div>
          <div id="emperor-status-panel" class="emperor-status-panel" hidden></div>
          <div id="stats-list" class="stats-list"></div>
        </aside>

        <section class="court-stage">
          <div id="scene-art" class="scene-art"></div>
          <div id="comic-strip" class="comic-strip" aria-label="动态漫画分镜"></div>
          <div id="event-hand-panel" class="event-hand-panel"></div>
          <div id="strategy-map-panel" class="strategy-map-panel"></div>
          <div id="playdesk-panel" class="playdesk-panel"></div>
          <div class="scene-content">
            <div id="scene-kicker" class="scene-kicker">待诏</div>
            <h2 id="scene-title">皇城尚未启门</h2>
            <p id="scene-body">选择朝代后，史官会写下你的第一声啼哭。</p>
            <div id="choice-grid" class="choice-grid"></div>
            <div id="resolution" class="resolution" hidden></div>
          </div>
        </section>

        <aside class="right-rail">
          <section class="dynasty-card" id="current-dynasty"></section>
          <section class="crisis-card" id="crisis-card"></section>
          <section class="world-card event-card">
            <div class="panel-title">突发奏报</div>
            <div id="event-list" class="event-list"></div>
          </section>
          <section class="world-card command-card">
            <div class="panel-title">御令行动</div>
            <p id="command-status">登基后每季度可下多道御令，处理省份与派系，不推进大剧情。</p>
          </section>
          <section class="world-card">
            <div class="panel-title">天命目标</div>
            <div id="objective-list" class="objective-list"></div>
          </section>
          <section class="world-card strategy-card">
            <div class="panel-title">长期国策</div>
            <div id="strategy-list" class="strategy-list"></div>
          </section>
          <section class="world-card strategy-card">
            <div class="panel-title">势力关系</div>
            <div id="relation-list" class="relation-list"></div>
          </section>
          <section class="world-card">
            <div class="panel-title">四方省势</div>
            <div id="province-list" class="province-list"></div>
          </section>
          <section class="world-card">
            <div class="panel-title">军机外战</div>
            <div id="war-list" class="war-list"></div>
          </section>
          <section class="world-card diplomacy-card">
            <div class="panel-title">外邦诸国</div>
            <div id="foreign-list" class="foreign-list"></div>
          </section>
          <section class="world-card diplomacy-card">
            <div class="panel-title">密谋暗线</div>
            <div id="plot-list" class="plot-list"></div>
          </section>
          <section class="world-card justice-card">
            <div class="panel-title">舆论风向</div>
            <div id="opinion-panel" class="opinion-panel"></div>
          </section>
          <section class="world-card justice-card">
            <div class="panel-title">刑狱案卷</div>
            <div id="case-list" class="case-list"></div>
          </section>
          <section class="world-card system-card">
            <div class="panel-title">后宫势力</div>
            <div id="harem-list" class="harem-list"></div>
          </section>
          <section class="world-card system-card">
            <div class="panel-title">储位继承</div>
            <div id="heir-list" class="heir-list"></div>
          </section>
          <section class="world-card system-card">
            <div class="panel-title">官职任免</div>
            <div id="office-list" class="office-list"></div>
          </section>
          <section class="world-card talent-card">
            <div class="panel-title">天下人才谱</div>
            <div id="talent-list" class="talent-list"></div>
          </section>
          <section class="world-card">
            <div class="panel-title">朝堂派系</div>
            <div id="faction-list" class="faction-list"></div>
          </section>
          <section class="world-card">
            <div class="panel-title">群臣班底</div>
            <div id="court-list" class="court-list"></div>
          </section>
          <section class="world-card">
            <div class="panel-title">起居注</div>
            <ol id="history-list" class="history-list"></ol>
          </section>
        </aside>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/game-data.js"></script>
    <script src="/comics.js"></script>
    <script src="/events-ui.js"></script>
    <script src="/systems-ui.js"></script>
    <script src="/strategy-ui.js"></script>
    <script src="/diplomacy-ui.js"></script>
    <script src="/justice-ui.js"></script>
    <script src="/event-hand-ui.js?v=20260615-flow"></script>
    <script src="/strategy-map-ui.js?v=20260615-flow"></script>
    <script src="/talent-pool-ui.js"></script>
    <script src="/mini-games.js?v=20260615-flow"></script>
    <script src="/panel-renderers.js"></script>
    <script src="/app.js?v=20260615-flow"></script>
  </body>
</html>
